name: Metadata Direct Backfill

on:
  workflow_dispatch:
    inputs:
      source_site:
        description: 'Which source site backlog to target'
        required: true
        default: 'missav'
        type: choice
        options:
          - missav
          - all
          - 51cg
      batch_size:
        description: 'How many metadata rows to patch this run'
        required: false
        default: '40'
      concurrent_detail_pages:
        description: 'Concurrent detail pages'
        required: false
        default: '4'

concurrency:
  group: metadata-direct-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: scraper/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scraper/requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-chromium

    - name: Install Playwright Browsers
      run: |
        python -m playwright install chromium --with-deps

    - name: Select metadata queue
      id: queue
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      shell: bash
      run: |
        set -euo pipefail
        python3 scripts/select_metadata_queue.py \
          --source-site '${{ inputs.source_site }}' \
          --limit '${{ inputs.batch_size }}' \
          --output env > /tmp/metadata_queue.env
        cat /tmp/metadata_queue.env
        source /tmp/metadata_queue.env
        echo "queue_count=${METADATA_QUEUE_COUNT:-0}" >> "$GITHUB_OUTPUT"
        {
          echo 'queue_json<<EOF'
          echo "${METADATA_QUEUE_JSON:-[]}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

        {
          echo '## Metadata direct backfill selection'
          echo
          echo "- source_site: ${{ inputs.source_site }}"
          echo "- batch_size: ${{ inputs.batch_size }}"
          echo "- selected_rows: ${METADATA_QUEUE_COUNT:-0}"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Run metadata patcher
      if: ${{ steps.queue.outputs.queue_count != '0' }}
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        HEADLESS: 'true'
        USER_DATA_DIR: scraper/user_data
        SCRAPER_RUN_MODE: metadata_queue
        METADATA_QUEUE_JSON: ${{ steps.queue.outputs.queue_json }}
        CONCURRENT_DETAIL_PAGES: ${{ inputs.concurrent_detail_pages }}
        SUPABASE_UPSERT_CHUNK_SIZE: ${{ vars.SUPABASE_UPSERT_CHUNK_SIZE || '150' }}
        SUPABASE_MAX_RETRIES: ${{ vars.SUPABASE_MAX_RETRIES || '4' }}
        SUPABASE_RETRY_BASE_SECONDS: ${{ vars.SUPABASE_RETRY_BASE_SECONDS || '1.2' }}
        BLOCK_HEAVY_RESOURCES: ${{ vars.BLOCK_HEAVY_RESOURCES || 'true' }}
      run: |
        python scraper/main.py | tee scraper-run.log

    - name: No-op summary when queue empty
      if: ${{ steps.queue.outputs.queue_count == '0' }}
      run: echo "No metadata rows selected." | tee scraper-run.log

    - name: Upload scraper log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: metadata-direct-backfill-log-${{ github.run_number }}
        path: scraper-run.log
        if-no-files-found: warn
        retention-days: 14
