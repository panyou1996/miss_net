name: Daily Video Scraper

on:
  schedule:
    # Runs at 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode: sample for quick validation, full for daily breadth, index for quantity-first indexing'
        required: true
        default: 'sample'
        type: choice
        options:
          - sample
          - full
          - index
      source_tags:
        description: 'Comma-separated source tags (e.g. new,weekly_hot,monthly_hot). Empty means all/default for mode.'
        required: false
        default: 'new,weekly_hot,monthly_hot'
      missav_max_pages:
        description: 'Max MissAV pages to scan'
        required: false
        default: '5'
      cg_max_pages:
        description: 'Max 51CG pages to scan'
        required: false
        default: '1'
      skip_51cg:
        description: 'Skip 51CG sources during manual runs'
        required: true
        default: true
        type: boolean
      concurrent_detail_pages:
        description: 'Concurrent detail pages'
        required: false
        default: '4'
      detail_fetch_policy:
        description: 'smart = fetch missing metadata, none = list-page indexing only, force = always fetch details'
        required: false
        default: 'smart'
        type: choice
        options:
          - smart
          - none
          - force
      discover_missav_sources:
        description: 'Discover more MissAV source pages from seed pages'
        required: true
        default: true
        type: boolean
      discovered_source_limit:
        description: 'Max dynamically discovered MissAV sources'
        required: false
        default: '60'
      early_stop_streak:
        description: 'Consecutive stale pages before early stop'
        required: false
        default: '2'
      early_stop_min_page:
        description: 'Minimum page before early stop can kick in'
        required: false
        default: '3'

concurrency:
  group: daily-video-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: scraper/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scraper/requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-chromium

    - name: Install Playwright Browsers
      run: |
        python -m playwright install chromium --with-deps

    - name: Run Scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        HEADLESS: "true"
        USER_DATA_DIR: scraper/user_data
        SCRAPER_RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && (inputs.run_mode || 'sample') || 'full' }}
        SCRAPER_SOURCE_TAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.source_tags || '' }}
        MISSAV_MAX_PAGES: ${{ github.event_name == 'workflow_dispatch' && (inputs.missav_max_pages || '5') || (vars.MISSAV_MAX_PAGES || '50') }}
        CG_MAX_PAGES: ${{ github.event_name == 'workflow_dispatch' && (inputs.cg_max_pages || '1') || (vars.CG_MAX_PAGES || '3') }}
        CONCURRENT_DETAIL_PAGES: ${{ github.event_name == 'workflow_dispatch' && (inputs.concurrent_detail_pages || '4') || (vars.CONCURRENT_DETAIL_PAGES || '4') }}
        DETAIL_FETCH_POLICY: ${{ github.event_name == 'workflow_dispatch' && (inputs.detail_fetch_policy || 'smart') || (vars.DETAIL_FETCH_POLICY || 'smart') }}
        DISCOVER_MISSAV_SOURCES: ${{ github.event_name == 'workflow_dispatch' && (inputs.discover_missav_sources && 'true' || 'false') || (vars.DISCOVER_MISSAV_SOURCES || 'false') }}
        DISCOVERED_SOURCE_LIMIT: ${{ github.event_name == 'workflow_dispatch' && (inputs.discovered_source_limit || '60') || (vars.DISCOVERED_SOURCE_LIMIT || '60') }}
        SKIP_51CG: ${{ github.event_name == 'workflow_dispatch' && (inputs.skip_51cg && 'true' || 'false') || 'false' }}
        EARLY_STOP_STREAK: ${{ github.event_name == 'workflow_dispatch' && (inputs.early_stop_streak || '2') || (vars.EARLY_STOP_STREAK || '3') }}
        EARLY_STOP_MIN_PAGE: ${{ github.event_name == 'workflow_dispatch' && (inputs.early_stop_min_page || '3') || (vars.EARLY_STOP_MIN_PAGE || '5') }}
        SUPABASE_UPSERT_CHUNK_SIZE: ${{ vars.SUPABASE_UPSERT_CHUNK_SIZE || '150' }}
        SUPABASE_MAX_RETRIES: ${{ vars.SUPABASE_MAX_RETRIES || '4' }}
        SUPABASE_RETRY_BASE_SECONDS: ${{ vars.SUPABASE_RETRY_BASE_SECONDS || '1.2' }}
        BLOCK_HEAVY_RESOURCES: ${{ vars.BLOCK_HEAVY_RESOURCES || 'true' }}
      run: |
        python scraper/main.py | tee scraper-run.log

    - name: Upload scraper log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scraper-log-${{ github.run_number }}
        path: scraper-run.log
        if-no-files-found: warn
        retention-days: 14
