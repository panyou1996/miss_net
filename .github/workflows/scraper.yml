name: Daily Video Scraper

on:
  schedule:
    # Runs at 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: daily-video-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: scraper/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scraper/requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-chromium

    - name: Install Playwright Browsers
      run: |
        python -m playwright install chromium --with-deps

    - name: Run Scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        HEADLESS: "true"
        USER_DATA_DIR: scraper/user_data
        MISSAV_MAX_PAGES: ${{ vars.MISSAV_MAX_PAGES || '50' }}
        CG_MAX_PAGES: ${{ vars.CG_MAX_PAGES || '3' }}
        CONCURRENT_DETAIL_PAGES: ${{ vars.CONCURRENT_DETAIL_PAGES || '4' }}
        SUPABASE_UPSERT_CHUNK_SIZE: ${{ vars.SUPABASE_UPSERT_CHUNK_SIZE || '150' }}
        SUPABASE_MAX_RETRIES: ${{ vars.SUPABASE_MAX_RETRIES || '4' }}
        SUPABASE_RETRY_BASE_SECONDS: ${{ vars.SUPABASE_RETRY_BASE_SECONDS || '1.2' }}
        BLOCK_HEAVY_RESOURCES: ${{ vars.BLOCK_HEAVY_RESOURCES || 'true' }}
      run: |
        python scraper/main.py | tee scraper-run.log

    - name: Upload scraper log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scraper-log-${{ github.run_number }}
        path: scraper-run.log
        if-no-files-found: warn
        retention-days: 14
