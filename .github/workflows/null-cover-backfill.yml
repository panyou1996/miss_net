name: Null Cover Backfill

on:
  schedule:
    # Runs at 06:00 UTC every day to chip away at remaining null-cover backlog
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      source_site:
        description: 'Which source site backlog to target'
        required: true
        default: 'missav'
        type: choice
        options:
          - missav
          - all
          - 51cg
      batch_size:
        description: 'How many null-cover rows to patch this run'
        required: false
        default: '40'
      concurrent_detail_pages:
        description: 'Concurrent detail pages'
        required: false
        default: '4'

concurrency:
  group: null-cover-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: scraper/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scraper/requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-chromium

    - name: Install Playwright Browsers
      run: |
        python -m playwright install chromium --with-deps

    - name: Select null-cover queue
      id: queue
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      shell: bash
      run: |
        set -euo pipefail
        python3 scripts/select_null_cover_queue.py \
          --source-site '${{ github.event_name == 'workflow_dispatch' && inputs.source_site || (vars.NULL_COVER_SOURCE_SITE || 'missav') }}' \
          --limit '${{ github.event_name == 'workflow_dispatch' && (inputs.batch_size || '40') || (vars.NULL_COVER_DAILY_BATCH_SIZE || '1000') }}' \
          --output env > /tmp/null_cover.env
        cat /tmp/null_cover.env
        source /tmp/null_cover.env
        echo "queue_count=${NULL_COVER_QUEUE_COUNT:-0}" >> "$GITHUB_OUTPUT"
        {
          echo 'queue_json<<EOF'
          echo "${NULL_COVER_QUEUE_JSON:-[]}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

        {
          echo '## Null-cover backfill selection'
          echo
          echo "- source_site: ${{ github.event_name == 'workflow_dispatch' && inputs.source_site || (vars.NULL_COVER_SOURCE_SITE || 'missav') }}"
          echo "- batch_size: ${{ github.event_name == 'workflow_dispatch' && (inputs.batch_size || '40') || (vars.NULL_COVER_DAILY_BATCH_SIZE || '1000') }}"
          echo "- selected_rows: ${NULL_COVER_QUEUE_COUNT:-0}"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Run null-cover patcher
      if: ${{ steps.queue.outputs.queue_count != '0' }}
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        HEADLESS: 'true'
        USER_DATA_DIR: scraper/user_data
        SCRAPER_RUN_MODE: null_cover
        NULL_COVER_QUEUE_JSON: ${{ steps.queue.outputs.queue_json }}
        CONCURRENT_DETAIL_PAGES: ${{ github.event_name == 'workflow_dispatch' && (inputs.concurrent_detail_pages || '4') || (vars.NULL_COVER_DAILY_CONCURRENT_DETAIL_PAGES || '4') }}
        SUPABASE_UPSERT_CHUNK_SIZE: ${{ vars.SUPABASE_UPSERT_CHUNK_SIZE || '150' }}
        SUPABASE_MAX_RETRIES: ${{ vars.SUPABASE_MAX_RETRIES || '4' }}
        SUPABASE_RETRY_BASE_SECONDS: ${{ vars.SUPABASE_RETRY_BASE_SECONDS || '1.2' }}
        BLOCK_HEAVY_RESOURCES: ${{ vars.BLOCK_HEAVY_RESOURCES || 'true' }}
      run: |
        python scraper/main.py | tee scraper-run.log

    - name: No-op summary when queue empty
      if: ${{ steps.queue.outputs.queue_count == '0' }}
      run: echo "No null-cover rows selected." | tee scraper-run.log

    - name: Upload scraper log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: null-cover-backfill-log-${{ github.run_number }}
        path: scraper-run.log
        if-no-files-found: warn
        retention-days: 14
